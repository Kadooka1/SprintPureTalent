<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
    <head>
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
        <meta charset="utf-8">
        <title>PureTalent — Acesso</title>
        <link rel="stylesheet" type="text/css" href="style.css">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="main">

            <!-- ══ FORMULÁRIO DE CADASTRO ══ -->
            <div class="container a-container" id="a-container">
                <form id="a-form" class="form reg-form" method="" action="" novalidate>

                    <h2 class="form_title title">Criar conta</h2>
                    <p class="form__subtitle">Escolha o tipo de acesso</p>

                    <!-- Abas Candidato / Empresa -->
                    <div class="reg-tabs">
                        <button type="button" class="reg-tab active" data-tab="candidate">Candidato</button>
                        <button type="button" class="reg-tab" data-tab="company">Empresa</button>
                    </div>

                    <div class="alert-error" id="reg-error" style="display:none"></div>

                    <!-- ── Painel Candidato ── -->
                    <div class="reg-panel active" id="panel-candidate">

                        <div class="form-group">
                            <label for="rc-name">Nome completo</label>
                            <input id="rc-name" name="full_name" type="text" class="form-control"
                                placeholder="Seu Nome Completo" autocomplete="name">
                            <span class="field-error" id="err-full_name"></span>
                        </div>

                        <div class="form-group">
                            <label for="rc-email">E-mail</label>
                            <input id="rc-email" name="email" type="email" class="form-control"
                                placeholder="seu@email.com" autocomplete="email">
                            <span class="field-error" id="err-email"></span>
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="rc-birth">Data de nascimento</label>
                                <input id="rc-birth" name="birth_date" type="date" class="form-control">
                                <span class="field-error" id="err-birth_date"></span>
                            </div>
                            <div class="form-group">
                                <label for="rc-phone">Telefone <span class="optional">(opcional)</span></label>
                                <input id="rc-phone" name="phone" type="tel" class="form-control"
                                    placeholder="(11) 99999-9999" autocomplete="tel">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="rc-pass">Senha</label>
                            <div class="input-password-wrapper">
                                <input id="rc-pass" name="password" type="password" class="form-control"
                                    placeholder="Mín. 8 chars, 1 número, 1 especial">
                                <button type="button" class="btn-toggle-pass" data-target="rc-pass" aria-label="Ver senha">👁️</button>
                            </div>
                            <div class="strength-bar-wrapper" id="strength-candidate" style="display:none">
                                <div class="strength-segments">
                                    <span class="strength-segment"></span>
                                    <span class="strength-segment"></span>
                                    <span class="strength-segment"></span>
                                    <span class="strength-segment"></span>
                                </div>
                                <span class="strength-label" id="strength-label-candidate"></span>
                            </div>
                            <span class="field-error" id="err-password"></span>
                        </div>

                        <div class="form-group">
                            <label for="rc-confirm">Confirmar senha</label>
                            <div class="input-password-wrapper">
                                <input id="rc-confirm" name="confirm_password" type="password" class="form-control"
                                    placeholder="Repita a senha">
                                <button type="button" class="btn-toggle-pass" data-target="rc-confirm" aria-label="Ver confirmação">👁️</button>
                            </div>
                            <span class="field-error" id="err-confirm_password"></span>
                        </div>

                    </div><!-- /panel-candidate -->

                    <!-- ── Painel Empresa ── -->
                    <div class="reg-panel" id="panel-company">

                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="co-legal">Razão social</label>
                                <input id="co-legal" name="legal_name" type="text" class="form-control"
                                    placeholder="Empresa LTDA">
                                <span class="field-error" id="err-legal_name"></span>
                            </div>
                            <div class="form-group">
                                <label for="co-trade">Nome fantasia</label>
                                <input id="co-trade" name="trade_name" type="text" class="form-control"
                                    placeholder="Minha Empresa">
                                <span class="field-error" id="err-trade_name"></span>
                            </div>
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="co-cnpj">CNPJ</label>
                                <input id="co-cnpj" name="cnpj" type="text" class="form-control"
                                    placeholder="00.000.000/0000-00" maxlength="18">
                                <span class="field-error" id="err-cnpj"></span>
                            </div>
                            <div class="form-group">
                                <label for="co-size">Porte</label>
                                <select id="co-size" name="size" class="form-control">
                                    <option value="">Selecione...</option>
                                    <option value="micro">Microempresa</option>
                                    <option value="small">Pequena</option>
                                    <option value="medium">Média</option>
                                    <option value="large">Grande</option>
                                </select>
                                <span class="field-error" id="err-size"></span>
                            </div>
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="co-email">E-mail corporativo</label>
                                <input id="co-email" name="co_email" type="email" class="form-control"
                                    placeholder="contato@empresa.com">
                                <span class="field-error" id="err-co_email"></span>
                            </div>
                            <div class="form-group">
                                <label for="co-sector">Setor</label>
                                <input id="co-sector" name="sector" type="text" class="form-control"
                                    placeholder="Ex: Tecnologia, Finanças...">
                                <span class="field-error" id="err-sector"></span>
                            </div>
                        </div>

                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="co-phone">Telefone <span class="optional">(opcional)</span></label>
                                <input id="co-phone" name="co_phone" type="tel" class="form-control"
                                    placeholder="(11) 3000-0000">
                            </div>
                            <div class="form-group">
                                <label for="co-site">Site <span class="optional">(opcional)</span></label>
                                <input id="co-site" name="website" type="url" class="form-control"
                                    placeholder="https://empresa.com">
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="co-pass">Senha</label>
                            <div class="input-password-wrapper">
                                <input id="co-pass" name="co_password" type="password" class="form-control"
                                    placeholder="Mín. 8 chars, 1 número, 1 especial">
                                <button type="button" class="btn-toggle-pass" data-target="co-pass" aria-label="Ver senha">👁️</button>
                            </div>
                            <div class="strength-bar-wrapper" id="strength-company" style="display:none">
                                <div class="strength-segments">
                                    <span class="strength-segment"></span>
                                    <span class="strength-segment"></span>
                                    <span class="strength-segment"></span>
                                    <span class="strength-segment"></span>
                                </div>
                                <span class="strength-label" id="strength-label-company"></span>
                            </div>
                            <span class="field-error" id="err-co_password"></span>
                        </div>

                        <div class="form-group">
                            <label for="co-confirm">Confirmar senha</label>
                            <input id="co-confirm" name="co_confirm_password" type="password" class="form-control"
                                placeholder="Repita a senha">
                            <span class="field-error" id="err-co_confirm_password"></span>
                        </div>

                    </div><!-- /panel-company -->

                    <button type="button" class="form__button button reg-submit" id="reg-submit-btn">Criar Conta</button>

                </form>
            </div>

            <!-- ══ FORMULÁRIO DE LOGIN ══ -->
